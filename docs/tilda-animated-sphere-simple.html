<!-- 
    АНИМИРОВАННАЯ СФЕРА (упрощенный вариант) для Zero блока в Тильде
    Скопируйте весь код ниже и вставьте в Zero блок
    Без внешних библиотек
-->

<style>
    .sphere-container {
        position: relative;
        width: 100%;
        height: 100vh;
        min-height: 600px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        background: transparent;
    }
    
    .animated-sphere {
        width: 400px;
        height: 400px;
        position: relative;
        border-radius: 50%;
        background: radial-gradient(
            circle at 30% 30%,
            rgba(182, 255, 0, 0.8) 0%,
            rgba(125, 81, 254, 0.6) 50%,
            rgba(36, 40, 52, 0.8) 100%
        );
        box-shadow: 
            0 0 60px rgba(125, 81, 254, 0.5),
            inset -30px -30px 60px rgba(0, 0, 0, 0.5),
            inset 30px 30px 60px rgba(182, 255, 0, 0.2);
        animation: rotate 20s linear infinite, pulse 3s ease-in-out infinite;
    }
    
    @keyframes rotate {
        from {
            transform: rotateY(0deg) rotateX(0deg);
        }
        to {
            transform: rotateY(360deg) rotateX(360deg);
        }
    }
    
    @keyframes pulse {
        0%, 100% {
            transform: scale(1);
            box-shadow: 
                0 0 60px rgba(125, 81, 254, 0.5),
                inset -30px -30px 60px rgba(0, 0, 0, 0.5),
                inset 30px 30px 60px rgba(182, 255, 0, 0.2);
        }
        50% {
            transform: scale(1.05);
            box-shadow: 
                0 0 80px rgba(125, 81, 254, 0.7),
                inset -30px -30px 60px rgba(0, 0, 0, 0.5),
                inset 30px 30px 60px rgba(182, 255, 0, 0.3);
        }
    }
    
    @media (max-width: 768px) {
        .animated-sphere {
            width: 300px;
            height: 300px;
        }
    }
</style>

<div class="sphere-container">
    <div class="animated-sphere"></div>
</div>
