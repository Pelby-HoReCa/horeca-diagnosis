<!-- 
    КНОПКА "Бесплатная консультация" для мобильного меню в Тильде
    Вставьте этот код в настройки бокового меню (гамбургер)
    Путь: Настройки блока → Боковое меню → HTML код в меню
-->

<style>
    /* 
        Кнопка для мобильного меню
        .mobile-menu-button - класс для стилизации кнопки
    */
    .mobile-menu-button {
        /* 
            position: fixed;
            Фиксированное позиционирование - кнопка закреплена на экране
            fixed = элемент остается на месте при прокрутке страницы
        */
        position: fixed;
        
        /* 
            top: 0;
            Позиция сверху - кнопка прижата к верхнему краю экрана
            0 = без отступа от верха
        */
        top: 23px;
        
        /* 
            left: 55%;
            Позиция слева - 55% от ширины экрана
            55% = смещение вправо от центра
        */
        left: 55%;
        
        /* 
            transform: translateX(-50%);
            Сдвигаем кнопку влево на половину её ширины для центрирования
            translateX(-50%) = сдвиг на -50% от собственной ширины
            Вместе с left: 50% создает идеальное центрирование
        */
        transform: translateX(-50%);
        
        /* 
            z-index: 9999;
            Уровень наложения - кнопка поверх других элементов
            9999 = очень высокий приоритет, будет поверх шапки
        */
        z-index: 9999;
        
        /* 
            display: inline-block;
            Делает кнопку строчно-блочным элементом
            inline-block = можно задать ширину, но элемент остается в потоке
        */
        display: inline-block;
        
        /* 
            width: calc(100% - 32px);
            Ширина кнопки - 100% минус отступы слева и справа
            calc(100% - 32px) = полная ширина минус 16px слева и 16px справа
            Можно изменить на фиксированное значение, например: max-width: 300px;
        */
        width: calc(100% - 32px);
        
        /* 
            max-width: 180px;
            Максимальная ширина кнопки
            180px = кнопка не будет шире этого значения
        */
        max-width: 180px;
        
        /* 
            padding: 7px 10px;
            Внутренние отступы кнопки
            7px - сверху и снизу (вертикальный отступ)
            10px - слева и справа (горизонтальный отступ)
            Создает пространство между текстом и краями кнопки
        */
        padding: 7px 10px;
        
        /* 
            background: linear-gradient(...);
            Фон кнопки - линейный градиент от синего к темно-синему
            linear-gradient = создает плавный переход между цветами
            0turn = направление градиента (0 градусов = сверху вниз)
            rgba(33,98,209,1) 11% = синий цвет в начале (11% от высоты)
            rgba(0,23,76,1) 100% = темно-синий цвет в конце (100% = внизу)
        */
        background: linear-gradient(0turn, rgba(33,98,209,1) 11%, rgba(0,23,76,1) 100%);
        
        /* 
            border: 2px solid #01133D;
            Обводка кнопки
            2px = толщина обводки
            solid = сплошная линия
            #01133D = темно-синий цвет обводки
        */
        border: 2px solid #01133D;
        
        /* 
            border-radius: 10px;
            Скругление углов кнопки
            10px = радиус скругления углов
            Создает мягкие, скругленные углы
        */
        border-radius: 10px;
        
        /* 
            color: #ffffff;
            Цвет текста внутри кнопки
            #ffffff = белый цвет для хорошей читаемости на темном градиентном фоне
        */
        color: #ffffff;
        
        /* 
            font-family: 'Inter', sans-serif;
            Шрифт текста кнопки
            'Inter' - современный шрифт (если не загружен, используется sans-serif)
            sans-serif = шрифт без засечек (резервный вариант)
        */
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        
        /* 
            font-size: 12px;
            Размер шрифта текста кнопки
            12px = размер шрифта
        */
        font-size: 12px;
        
        /* 
            font-weight: 600;
            Толщина шрифта
            600 = полужирный (semibold), хорошо читается
        */
        font-weight: 600;
        
        /* 
            text-align: center;
            Выравнивание текста по центру
            center = текст по центру кнопки
        */
        text-align: center;
        
        /* 
            white-space: nowrap;
            Запрещает перенос текста на новую строку
            nowrap = текст всегда в одну строку, не переносится
        */
        white-space: nowrap;
        
        /* 
            text-decoration: none;
            Убираем подчеркивание (если кнопка - это ссылка)
            none = без подчеркивания
        */
        text-decoration: none;
        
        /* 
            cursor: pointer;
            Меняем курсор при наведении на кнопку
            pointer = рука с указательным пальцем (как на ссылках)
        */
        cursor: pointer;
        
        /* 
            transition: all 0.3s ease;
            Плавная анимация при изменении свойств кнопки
            all = все свойства анимируются
            0.3s = длительность анимации (0.3 секунды)
            ease = плавное ускорение и замедление
        */
        transition: all 0.3s ease;
        
        /* 
            margin: 0;
            Убираем внешние отступы, так как кнопка fixed
            0 = без отступов, кнопка прижата к краям экрана
        */
        margin: 0;
        
        /* 
            box-sizing: border-box;
            Включает padding и border в общую ширину элемента
            border-box = padding и border учитываются в width
        */
        box-sizing: border-box;
    }
    
    /* 
        Убираем все цветовые изменения при наведении и нажатии
        Кнопка остается с одинаковым внешним видом
    */
    
    /* 
        Стили для ссылки - убираем стандартные стили браузера
        Обеспечиваем белый цвет текста всегда
    */
    .mobile-menu-button,
    .mobile-menu-button:link,
    .mobile-menu-button:visited,
    .mobile-menu-button:hover,
    .mobile-menu-button:active,
    .mobile-menu-button:focus {
        color: #ffffff !important;
        text-decoration: none;
    }
    
    /* 
        Отступ для контента, чтобы он не перекрывался кнопкой
        Добавьте этот класс к основному контенту страницы
    */
    body.has-fixed-button {
        padding-top: 60px; /* Высота кнопки + небольшой отступ */
    }
    
    /* 
        Только для мобильных устройств
        @media - медиа-запрос для адаптивности
    */
    @media (min-width: 769px) {
        /* 
            На десктопе скрываем кнопку
            display: none = элемент не отображается
        */
        .mobile-menu-button {
            display: none;
        }
        
        /* 
            Убираем отступ на десктопе
        */
        body.has-fixed-button {
            padding-top: 0;
        }
    }
</style>

<!-- 
    HTML элемент кнопки
    Можно использовать как <button> или <a> в зависимости от назначения
-->

<!-- Ссылка на попап формы -->
<a href="https://vivprofit.ru/dsgfdnbdsfda#popup:myform" class="mobile-menu-button">
    Бесплатная консультация
</a>

<!-- 
    Вариант 2: Ссылка (если кнопка ведет на другую страницу или якорь)
    Раскомментируйте этот вариант, если нужна ссылка:
-->
<!--

    Бесплатная консультация
</a>

<!-- 
    Вариант 3: Ссылка на телефон (если нужно позвонить)
    Раскомментируйте этот вариант, если нужен звонок:
-->
<!--
<a href="tel:+79313515828" class="mobile-menu-button">
    Бесплатная консультация
</a>
-->

<script>
(function() {
    function addContentPadding() {
        if (window.innerWidth < 769) {
            document.body.classList.add('has-fixed-button');
        } else {
            document.body.classList.remove('has-fixed-button');
        }
    }
    addContentPadding();
    window.addEventListener('resize', addContentPadding);
})();
</script>
