<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
        }

        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(200% 184% at 50% 5%, 
                #242834 31.31%,      /* Midnight Express */
                #7d51fe 47.50%,      /* Medium Slate Blue - ваш фиолетовый */
                #cfe1ed 58.40%,      /* Pattens Blue */
                #ffffff 85.77%       /* White */
            );
            animation: fadeOut 0.5s ease-out 4.5s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .preloader-content {
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            position: relative;
            display: inline-block;
        }

        .logo-main {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: clamp(48px, 8vw, 120px);
            font-weight: 700;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            position: relative;
            background: linear-gradient(135deg, 
                rgba(125, 81, 254, 0.9) 0%,      /* Medium Slate Blue */
                rgba(207, 225, 237, 0.8) 30%,   /* Pattens Blue */
                rgba(182, 255, 0, 0.7) 60%,     /* Spring Bud */
                rgba(125, 81, 254, 0.9) 100%    /* Medium Slate Blue */
            );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(125, 81, 254, 0.5));
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                filter: drop-shadow(0 0 30px rgba(125, 81, 254, 0.5)) 
                        drop-shadow(0 0 60px rgba(125, 81, 254, 0.3));
            }
            to {
                filter: drop-shadow(0 0 40px rgba(125, 81, 254, 0.7)) 
                        drop-shadow(0 0 80px rgba(182, 255, 0, 0.4));
            }
        }

        /* 3D стеклянный эффект */
        .logo-main::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.3) 0%,
                rgba(125, 81, 254, 0.2) 50%,
                rgba(182, 255, 0, 0.2) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transform: translateZ(20px);
            filter: blur(1px);
            opacity: 0.6;
            z-index: -1;
        }

        .logo-main::after {
            content: '';
            position: absolute;
            top: -10%;
            left: -5%;
            width: 110%;
            height: 120%;
            background: linear-gradient(135deg, 
                transparent 0%,
                rgba(255, 255, 255, 0.1) 30%,
                transparent 60%
            );
            border-radius: 50%;
            transform: rotate(-20deg);
            z-index: -2;
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            0%, 100% {
                opacity: 0;
                transform: rotate(-20deg) translateX(-100%);
            }
            50% {
                opacity: 1;
                transform: rotate(-20deg) translateX(100%);
            }
        }

        /* Подзаголовок */
        .logo-subtitle {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: clamp(12px, 1.5vw, 24px);
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Дополнительный 3D эффект через text-shadow */
        .logo-main {
            text-shadow: 
                0 1px 0 rgba(255, 255, 255, 0.3),
                0 2px 10px rgba(125, 81, 254, 0.4),
                0 4px 20px rgba(125, 81, 254, 0.3),
                0 8px 40px rgba(125, 81, 254, 0.2),
                0 0 60px rgba(125, 81, 254, 0.1);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .logo-main {
                font-size: clamp(36px, 12vw, 80px);
            }
            
            .logo-subtitle {
                font-size: clamp(10px, 2vw, 18px);
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="preloader-content">
            <div class="logo-container">
                <div class="logo-main" data-text="ROYALTY TEAMS">ROYALTY TEAMS</div>
                <div class="logo-subtitle">ECO-SYSTEM FOR BUSINESS</div>
            </div>
        </div>
    </div>

    <script>
        // Удаляем прелоадер через 5 секунд
        setTimeout(function() {
            const preloader = document.getElementById('preloader');
            if (preloader) {
                preloader.style.display = 'none';
                document.body.style.overflow = '';
            }
        }, 5000);

        // Дополнительная проверка на случай, если страница загрузилась раньше
        window.addEventListener('load', function() {
            setTimeout(function() {
                const preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.style.display = 'none';
                    document.body.style.overflow = '';
                }
            }, 5000);
        });
    </script>
</body>
</html>
