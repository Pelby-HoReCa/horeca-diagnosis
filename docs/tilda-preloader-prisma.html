    ПРЕЛОАДЕР ДЛЯ ТИЛЬДЫ - ВАРИАНТ 2: Prisma (оригинальная надпись)
    Скопируйте весь код ниже и вставьте в блок "HTML код" в Тильде
-->

<style>
    #royalty-preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #242834;
        animation: royaltyFadeOut 0.5s ease-out 4.5s forwards;
        overflow: hidden;
    }

    @keyframes royaltyFadeOut {
        to {
            opacity: 0;
            visibility: hidden;
        }
    }

    .royalty-preloader-content {
        text-align: center;
        animation: royaltyFadeIn 1.5s ease-in;
        position: relative;
        z-index: 1;
    }

    @keyframes royaltyFadeIn {
        from {
            opacity: 0;
        }
        to {
            opacity: 1;
        }
    }

    .royalty-logo-container {
        position: relative;
        display: inline-block;
    }

    .prisma-text {
        font-family: 'Montserrat', sans-serif;
        font-size: clamp(80px, 14vw, 180px);
        font-weight: 700;
        letter-spacing: 2px;
        position: relative;
        display: inline-block;
        /* Основная «стеклянная» заливка - менее яркие цвета */
        background: linear-gradient(
            90deg,
            rgba(180, 0, 255, 0.4) 0%,
            rgba(76, 0, 255, 0.35) 20%,
            rgba(0, 0, 0, 0.8) 40%,
            rgba(0, 0, 0, 0.8) 60%,
            rgba(76, 0, 255, 0.35) 80%,
            rgba(180, 0, 255, 0.4) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        /* Убрано свечение - только эффект стекла */
        /* Углубление / стеклянный край */
        text-shadow:
            0 0 4px rgba(255, 255, 255, 0.2),
            0 0 8px rgba(255, 255, 255, 0.15),
            0 1px 2px rgba(0, 0, 0, 0.5),
            0 2px 4px rgba(0, 0, 0, 0.3);
    }

    /* Эффект «глянца» сверху - стеклянный эффект */
    .prisma-text::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
            120deg,
            rgba(255,255,255,0.3) 0%,
            rgba(255,255,255,0.1) 30%,
            rgba(180, 0, 255, 0.15) 50%,
            rgba(76, 0, 255, 0.1) 70%,
            rgba(0,0,0,0) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        mix-blend-mode: screen;
        pointer-events: none;
        z-index: 2;
    }

    /* Дополнительный слой для глубины стекла */
    .prisma-text::after {
        content: "";
        position: absolute;
        left: 2px;
        top: 2px;
        width: 100%;
        height: 100%;
        background: linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.6) 0%,
            rgba(0, 0, 0, 0.5) 50%,
            rgba(0, 0, 0, 0.6) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        filter: blur(2px);
        opacity: 0.5;
        z-index: -1;
        pointer-events: none;
    }

    @media (max-width: 768px) {
        .prisma-text {
            font-size: clamp(60px, 18vw, 140px);
        }
    }

    body.royalty-preloader-active {
        overflow: hidden !important;
    }
</style>

<div id="royalty-preloader">
    <div class="royalty-preloader-content">
        <div class="royalty-logo-container">
            <div class="prisma-text">Prisma</div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';
    document.body.classList.add('royalty-preloader-active');
    setTimeout(function() {
        const preloader = document.getElementById('royalty-preloader');
        if (preloader) {
            preloader.style.display = 'none';
            document.body.classList.remove('royalty-preloader-active');
        }
    }, 5000);
    if (document.readyState === 'complete') {
        setTimeout(function() {
            const preloader = document.getElementById('royalty-preloader');
            if (preloader) {
                preloader.style.display = 'none';
                document.body.classList.remove('royalty-preloader-active');
            }
        }, 5000);
    } else {
        window.addEventListener('load', function() {
            setTimeout(function() {
                const preloader = document.getElementById('royalty-preloader');
                if (preloader) {
                    preloader.style.display = 'none';
                    document.body.classList.remove('royalty-preloader-active');
                }
            }, 5000);
        });
    }
})();
</script>
