<!-- 
    КНОПКА "Button - Main" для Zero блока в Тильде
    Стиль как на референсе, но с вашими корпоративными цветами
    Скопируйте весь код ниже и вставьте в Zero блок
-->

<style>
    /* 
        Основной класс кнопки
        .button-main - это имя класса, которое мы используем для стилизации
    */
    .button-main {
        /* 
            display: inline-block;
            Делает кнопку блочным элементом, но позволяет ей быть в строке
            inline-block = можно задать ширину/высоту, но элемент остается в потоке текста
        */
        display: inline-block;
        
        /* 
            padding: 12px 24px;
            Внутренние отступы кнопки
            12px - сверху и снизу (вертикальный отступ)
            24px - слева и справа (горизонтальный отступ)
            Это создает пространство между текстом и краями кнопки
        */
        padding: 12px 24px;
        
        /* 
            background-color: #7d51fe;
            Фон кнопки - ваш корпоративный фиолетовый цвет
            #7d51fe = Medium Slate Blue из вашей палитры
        */
        background-color: #7d51fe;
        
        /* 
            color: #ffffff;
            Цвет текста внутри кнопки
            #ffffff = белый цвет для хорошей читаемости на фиолетовом фоне
        */
        color: #ffffff;
        
        /* 
            border: none;
            Убираем стандартную рамку браузера
            none = без рамки
        */
        border: none;
        
        /* 
            border-radius: 64px;
            Скругление углов кнопки
            64px = очень скругленная кнопка (почти овальная форма)
            Это создает современный, мягкий вид
        */
        border-radius: 64px;
        
        /* 
            font-family: 'Inter', sans-serif;
            Шрифт текста кнопки
            'Inter' - современный шрифт (если не загружен, используется sans-serif)
            sans-serif = шрифт без засечек (резервный вариант)
        */
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        
        /* 
            font-size: 14px;
            Размер шрифта текста кнопки
            14px = стандартный размер для кнопок
        */
        font-size: 14px;
        
        /* 
            font-weight: 500;
            Толщина шрифта
            500 = средняя толщина (medium), не слишком жирный, не слишком тонкий
        */
        font-weight: 500;
        
        /* 
            text-align: center;
            Выравнивание текста по центру
            center = текст по центру кнопки
        */
        text-align: center;
        
        /* 
            text-decoration: none;
            Убираем подчеркивание (если кнопка - это ссылка)
            none = без подчеркивания
        */
        text-decoration: none;
        
        /* 
            cursor: pointer;
            Меняем курсор при наведении на кнопку
            pointer = рука с указательным пальцем (как на ссылках)
        */
        cursor: pointer;
        
        /* 
            transition: all 0.3s ease;
            Плавная анимация при изменении свойств кнопки
            all = все свойства анимируются
            0.3s = длительность анимации (0.3 секунды)
            ease = плавное ускорение и замедление
        */
        transition: all 0.3s ease;
        
        /* 
            box-shadow: 0 4px 12px rgba(125, 81, 254, 0.3);
            Тень кнопки для создания эффекта глубины
            0 = смещение по горизонтали (нет смещения)
            4px = смещение по вертикали (тень внизу)
            12px = размытие тени
            rgba(125, 81, 254, 0.3) = цвет тени (ваш фиолетовый с прозрачностью 30%)
        */
        box-shadow: 0 4px 12px rgba(125, 81, 254, 0.3);
    }
    
    /* 
        :hover - стили при наведении курсора на кнопку
        Это псевдокласс, который срабатывает, когда пользователь наводит мышь
    */
    .button-main:hover {
        /* 
            background-color: #b6ff00;
            Меняем фон кнопки при наведении на ваш зеленый цвет
            #b6ff00 = Spring Bud из вашей палитры
        */
        background-color: #b6ff00;
        
        /* 
            color: #242834;
            Меняем цвет текста на темный при наведении
            #242834 = Midnight Express (темный цвет для читаемости на зеленом фоне)
        */
        color: #242834;
        
        /* 
            transform: translateY(-2px);
            Поднимаем кнопку вверх при наведении
            translateY(-2px) = сдвиг на 2 пикселя вверх
            Создает эффект "поднятия" кнопки
        */
        transform: translateY(-2px);
        
        /* 
            box-shadow: 0 6px 20px rgba(182, 255, 0, 0.4);
            Усиливаем тень при наведении
            0 = без горизонтального смещения
            6px = больше вертикальное смещение
            20px = больше размытие
            rgba(182, 255, 0, 0.4) = зеленый цвет тени с прозрачностью 40%
        */
        box-shadow: 0 6px 20px rgba(182, 255, 0, 0.4);
    }
    
    /* 
        :active - стили при нажатии на кнопку
        Срабатывает, когда пользователь кликает на кнопку
    */
    .button-main:active {
        /* 
            transform: translateY(0);
            Возвращаем кнопку в исходное положение при нажатии
            translateY(0) = без смещения
            Создает эффект "нажатия"
        */
        transform: translateY(0);
        
        /* 
            box-shadow: 0 2px 8px rgba(125, 81, 254, 0.3);
            Уменьшаем тень при нажатии
            Создает эффект, что кнопка "вдавливается"
        */
        box-shadow: 0 2px 8px rgba(125, 81, 254, 0.3);
    }
</style>

<!-- 
    HTML элемент кнопки
    Можно использовать как <button> или <a> в зависимости от назначения
-->

<!-- Вариант 1: Кнопка (если это действие на странице) -->
<button class="button-main">Начать работу</button>

<!-- 
    Вариант 2: Ссылка (если кнопка ведет на другую страницу или якорь)
    Раскомментируйте этот вариант, если нужна ссылка:
-->
<!--
<a href="#contact" class="button-main">Начать работу</a>
-->
